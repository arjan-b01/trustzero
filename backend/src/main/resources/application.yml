spring:
  application:
    name: trustzero-escrow-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/escrow_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

fireworks:
  api:
    # Fireworks — used for Evidence Analyst + Arbitrator (strong reasoning) + Vision
    url: https://api.fireworks.ai/inference/v1/chat/completions
    key: ${FIREWORKS_API_KEY}
    model: accounts/fireworks/models/glm-5p2
    vision-model: accounts/fireworks/models/qwen3p7-plus

# AMD vLLM — used for the two Advocates (fast, parallel, dedicated GPU)
vllm:
  api:
    url: https://counting-contest-shore-aimed.trycloudflare.com/v1/chat/completions
    key: not-needed
    model: Qwen/Qwen2.5-7B-Instruct

platform:
  commission-rate: 0.03