spring:
  application:
    name: trustzero-escrow-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/escrow_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

fireworks:
  api:
    url: https://api.fireworks.ai/inference/v1/chat/completions
    key: ${FIREWORKS_API_KEY:fw_K23zoU8pfGyNohySmJATTo}
    model: accounts/fireworks/models/glm-5p2

platform:
  commission-rate: 0.03